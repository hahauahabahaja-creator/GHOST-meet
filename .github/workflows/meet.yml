name: GHOST meet Super Stealth Chrome Engine

on:
  repository_dispatch:
    types: [start_ghost_runner]

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome & Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl gnupg xvfb ffmpeg pulseaudio dbus-x11 x11vnc novnc fluxbox
          # Ensure Google Chrome is installed
          if ! command -v google-chrome &> /dev/null; then
            wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
            sudo apt-get update -qq
            sudo apt-get install -y -qq google-chrome-stable
          fi

      - name: Fast Node Install
        run: |
          npm install --no-audit --no-fund --quiet

      - name: Fast Python Install
        run: |
          pip install openai-whisper torch --break-system-packages --quiet

      - name: Initialize Display & Audio
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 3
          fluxbox -display :99 &
          sleep 2
          pulseaudio -D --exit-idle-time=-1 --disallow-exit
          sleep 2
          pactl load-module module-virtual-sink sink_name=v_sink
          pactl set-default-sink v_sink
          pactl set-sink-volume v_sink 100%
          pactl set-source-volume v_sink.monitor 100%
          x11vnc -display :99 -forever -shared -passwd "$VNC_PASSWORD" -bg -quiet
          /usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &

      - name: Launch GHOST Chrome Runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_GROUP_ID: ${{ secrets.ALLOWED_GROUP_ID }}
          MEETING_URL: ${{ github.event.client_payload.meeting_url }}
          PLAYER_MESSAGE_ID: ${{ github.event.client_payload.player_message_id }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
          DISPLAY: :99
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: node scripts/github_runner.js

      - name: Wipe History & Self-Destruct
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run delete ${{ github.run_id }} || true
          gh run list --workflow "meet.yml" --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
