name: GHOST meet Heavy Runner

on:
  repository_dispatch:
    types: [start_ghost_runner]

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Critical Tools
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get install -y --no-install-recommends \
            xvfb ffmpeg pulseaudio dbus-x11 google-chrome-stable

      - name: Fast Node Install
        run: npm install --no-audit --no-fund --quiet --no-package-lock

      - name: Fast Python Install
        run: pip install SpeechRecognition --break-system-packages --quiet

      - name: Initialize Display & Audio
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          pulseaudio -D --exit-idle-time=-1
          pactl load-module module-virtual-sink sink_name=v_sink
          pactl set-default-sink v_sink

      - name: Launch GHOST Runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_GROUP_ID: ${{ secrets.ALLOWED_GROUP_ID }}
          # 🛠 Mapping BOTH possible naming conventions for the token
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          MEETING_URL: ${{ github.event.client_payload.meeting_url }}
          DISPLAY: :99
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: node scripts/github_runner.js
