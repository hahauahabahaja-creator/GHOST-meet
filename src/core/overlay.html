<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GHOST meet Overlay</title>
    <style>
        /* FULL-SCREEN GHOST meet BRANDING OVERLAY */
        #ghost-meet-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #0a0a0a 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            z-index: 2147483647; /* Highest possible z-index */
            pointer-events: none;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neon-branding {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #fff;
            text-shadow:
                0 0 10px #00f3ff,
                0 0 20px #00f3ff,
                0 0 40px #00f3ff,
                0 0 80px #00f3ff;
            animation: pulse-neon 2s infinite alternate;
        }

        @keyframes pulse-neon {
            0% {
                text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff, 0 0 80px #00f3ff;
                transform: scale(1.05);
            }
        }

        .handshake-icon {
            font-size: 50px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px #00f3ff);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loader-bar-container {
            width: 350px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 50px;
            position: relative;
            overflow: hidden;
        }

        .loader-bar-active {
            position: absolute;
            height: 100%;
            width: 50%;
            background: #00f3ff;
            box-shadow: 0 0 15px #00f3ff;
            animation: slide-loader 1.5s infinite ease-in-out;
        }

        @keyframes slide-loader {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        .status-tag {
            margin-top: 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00f3ff;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="ghost-meet-layer">
        <div class="handshake-icon">🤝</div>
        <div class="neon-branding">GHOST meet</div>
        <div class="status-tag">SECURE CAPTURE TERMINAL</div>
        <div class="loader-bar-container">
            <div class="loader-bar-active"></div>
        </div>
    </div>
</body>
</html>
