name: GHOST meet Ultimate Ghost Engine

on:
  repository_dispatch:
    types: [start_ghost_runner]

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Critical Tools & Brave Browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl gnupg xvfb ffmpeg pulseaudio dbus-x11 x11vnc novnc
          # Install Brave Browser
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"|sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq brave-browser

      - name: Fast Node Install
        run: |
          npm install --no-audit --no-fund --quiet
          npx playwright install-deps

      - name: Fast Python Install
        run: |
          pip install openai-whisper torch --break-system-packages --quiet

      - name: Initialize Display & Audio
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3
          pulseaudio -D --exit-idle-time=-1 --disallow-exit
          sleep 2
          pactl load-module module-virtual-sink sink_name=v_sink
          pactl set-default-sink v_sink
          pactl set-sink-volume v_sink 100%
          pactl set-source-volume v_sink.monitor 100%
          x11vnc -display :99 -forever -shared -passwd "$VNC_PASSWORD" -bg -quiet
          /usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &

      - name: Launch GHOST Ultimate Runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_GROUP_ID: ${{ secrets.ALLOWED_GROUP_ID }}
          MEETING_URL: ${{ github.event.client_payload.meeting_url }}
          PLAYER_MESSAGE_ID: ${{ github.event.client_payload.player_message_id }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
          DISPLAY: :99
          BRAVE_PATH: /usr/bin/brave-browser
        run: node scripts/github_runner.js

      - name: Wipe History & Self-Destruct
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run delete ${{ github.run_id }} || true
          gh run list --workflow "meet.yml" --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
