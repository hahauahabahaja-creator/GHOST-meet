name: GHOST meet Heavy Runner

on:
  repository_dispatch:
    types: [start_ghost_runner]

# Grant global permissions for log deletion and content reading
permissions:
  actions: write
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Critical Tools (Fast Mode)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            xvfb ffmpeg pulseaudio dbus-x11 google-chrome-stable x11vnc novnc

      - name: Fast Node Install
        run: npm install --no-audit --no-fund --quiet --no-package-lock

      - name: Fast Python Install
        run: pip install SpeechRecognition --break-system-packages --quiet

      - name: Initialize Display & Audio & Visual Bridge
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3
          # Secure VNC with password from GitHub Secrets
          x11vnc -display :99 -forever -shared -passwd "$VNC_PASSWORD" -bg -quiet
          /usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &
          pulseaudio -D --exit-idle-time=-1
          pactl load-module module-virtual-sink sink_name=v_sink
          pactl set-default-sink v_sink

      - name: Setup SSH for Serveo
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan serveo.net >> ~/.ssh/known_hosts

      - name: Launch GHOST Runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_GROUP_ID: ${{ secrets.ALLOWED_GROUP_ID }}
          # 🛠 Mapping BOTH possible naming conventions for the token
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          MEETING_URL: ${{ github.event.client_payload.meeting_url }}
          DISPLAY: :99
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: node scripts/github_runner.js

      - name: Self-Destruct Logs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning up traces and deleting workflow logs..."
          gh run delete ${{ github.run_id }} --repo ${{ github.repository }}
